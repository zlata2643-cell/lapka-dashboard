<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Копитрейдинг SONIC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #161311; --surface: #211c19; --surface-2: #2a2320;
    --red: #c1392b; --red-light: #e05a48; --gold: #d9b673;
    --rust: #935a3c; --taupe: #6b5b4f;
    --text: #f3ece0; --text-2: #a89a87;
    --border: rgba(217,182,115,0.18);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 0%, rgba(193,57,43,0.08), transparent 45%);
    color: var(--text); min-height: 100vh; padding: 20px 16px 40px;
    max-width: 430px; margin: 0 auto;
  }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
  .header-left h1 { font-size: 21px; font-weight: 700; color: var(--gold); }
  .header-left .sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .header-paw { width: 40px; height: 40px; background: linear-gradient(135deg, var(--red), var(--red-light)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }

  .periods { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 18px; }
  .period-btn { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); color: var(--text-2); font-size: 12px; padding: 7px 13px; border-radius: 20px; font-family: inherit; }
  .period-btn.active { background: linear-gradient(135deg, var(--red), var(--red-light)); border-color: var(--red); color: var(--text); font-weight: 600; }

  .label { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; opacity: 0.85; }

  .kpi-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .winrate-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 11px 13px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 12.5px; color: var(--text-2); }
  .winrate-card .wr-value { font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }

  .month-row { display: flex; gap: 8px; }
  .month-tile { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 8px; text-align: center; }
  .month-tile.current { border-color: rgba(217,182,115,0.4); }
  .month-tile .m-name { font-size: 10px; color: var(--text-2); text-transform: uppercase; }
  .month-tile .m-value { font-size: 13px; font-weight: 700; color: var(--gold); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .month-tile .m-delta { font-size: 9.5px; margin-top: 3px; }
  .month-tile .m-delta.up { color: var(--red-light); }
  .month-tile .m-delta.down { color: var(--text-2); }
  .kpi { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 13px; }
  .kpi .k-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi .k-value { font-size: 18px; font-weight: 700; color: var(--gold); margin-top: 4px; font-variant-numeric: tabular-nums; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 9px; }

  .growth-card { padding: 16px 14px 12px; }
  .growth-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .growth-title { font-size: 12.5px; color: var(--text-2); }
  .growth-end { font-size: 15px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .growth-svg-wrap { width: 100%; }

  .donut-card { display: flex; align-items: center; gap: 16px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; color: var(--text-2); }
  .legend-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  .acct-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .acct-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .acct-total { font-size: 17px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 50px; margin: 8px 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 3px; }
  .bar-labels { display: flex; gap: 3px; }
  .bar-label { flex: 1; text-align: center; font-size: 8px; color: var(--text-2); white-space: nowrap; overflow: hidden; }

  .updated { text-align: center; font-size: 10.5px; color: var(--text-2); margin-top: 24px; }

  .yesterday-card { background: linear-gradient(160deg, var(--surface) 0%, var(--surface-2) 100%); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  .yesterday-date { font-size: 11px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; }
  .yesterday-total { font-size: 30px; font-weight: 700; color: var(--gold); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .yesterday-list { display: flex; flex-direction: column; gap: 7px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  .yesterday-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
  .yesterday-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .yesterday-name { flex: 1; color: var(--text-2); }
  .yesterday-val { font-weight: 600; font-variant-numeric: tabular-nums; }

  .day-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 12px; }
  .day-row .d-label { color: var(--text-2); }
  .day-row .d-value { font-variant-numeric: tabular-nums; font-weight: 500; }
  .day-row .d-value.neg { color: var(--text-2); }
  .day-row .d-value.empty { color: var(--border); }
  .week-total-row { display: flex; justify-content: space-between; padding: 7px 2px; margin: 2px 0 8px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; color: var(--gold); }
  .week-total-row .pending { color: var(--text-2); font-weight: 400; }
  .day-list { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Копитрейдинг SONIC</h1>
    <div class="sub">4 счёта · чистыми, за вычетом 30%</div>
  </div>
  <div class="header-paw">💹</div>
</div>

<div class="label">Вчера</div>
<div class="yesterday-card" id="yesterdayCard"></div>

<div class="label">Период</div>
<div class="periods" id="periods"></div>

<div class="kpi-row">
  <div class="kpi"><div class="k-label" id="periodLabel">За период</div><div class="k-value" id="periodTotal">—</div></div>
  <div class="kpi"><div class="k-label">Всего с апреля</div><div class="k-value" id="lifeTotal">—</div></div>
</div>

<div class="winrate-card" id="winrateCard"></div>

<div class="label">Помесячно</div>
<div class="month-row" id="monthRow"></div>

<div class="label">Рост капитала</div>
<div class="card growth-card">
  <div class="growth-head"><span class="growth-title" id="growthTitle">Накопительно за период</span><span class="growth-end" id="growthEnd">—</span></div>
  <div class="growth-svg-wrap"><svg viewBox="0 0 320 100" id="growthSvg" style="width:100%;height:auto;display:block"></svg></div>
</div>

<div class="label">Доли счетов за период</div>
<div class="card donut-card">
  <svg width="96" height="96" viewBox="0 0 96 96" id="donut"></svg>
  <div class="donut-legend" id="donutLegend"></div>
</div>

<div class="label">По счетам · по дням</div>
<div id="acctList"></div>

<div class="updated" id="updated"></div>

const fmt = n => n.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});

// последняя дата в данных = точка отсчёта "сегодня"
let lastDate = "2000-01-01";
ACCOUNTS.forEach(a => { const ks = Object.keys(DATA[a]); if (ks.length) { const m = ks[ks.length-1]; if (m > lastDate) lastDate = m; } });
document.getElementById('updated').textContent = `Данные на ${lastDate.split('-').reverse().join('.')}`;

const PERIODS = [
  { key: '7d', label: '7 дней', days: 7 },
  { key: '30d', label: 'Месяц', days: 30 },
  { key: '90d', label: '3 месяца', days: 90 },
  { key: '180d', label: '6 месяцев', days: 180 },
  { key: 'all', label: 'Всё время', days: 99999 },
];
let activePeriod = '30d';

const periodsEl = document.getElementById('periods');
PERIODS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'period-btn' + (p.key === activePeriod ? ' active' : '');
  btn.textContent = p.label;
  btn.onclick = () => { activePeriod = p.key; render(); };
  btn.dataset.key = p.key;
  periodsEl.appendChild(btn);
});

function cutoffDate(days) {
  const d = new Date(lastDate + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() - days + 1);
  return d.toISOString().slice(0, 10);
}

function bucketKey(dateStr, mode) {
  if (mode === 'day') return dateStr;
  // неделя: понедельник этой недели
  const d = new Date(dateStr + 'T00:00:00Z');
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() - day + 1);
  return d.toISOString().slice(0, 10);
}

function render() {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.key === activePeriod));
  const period = PERIODS.find(p => p.key === activePeriod);
  const cutoff = period.key === 'all' ? '2000-01-01' : cutoffDate(period.days);
  const useDaily = period.days <= 30;
  const bucketMode = useDaily ? 'day' : 'week';

  // KPI
  let periodTotal = 0, lifeTotal = 0;
  const perAccountTotal = {};
  ACCOUNTS.forEach(a => {
    let pt = 0, lt = 0;
    Object.entries(DATA[a]).forEach(([date, v]) => {
      lt += v;
      if (date >= cutoff && date <= lastDate) pt += v;
    });
    perAccountTotal[a] = pt;
    periodTotal += pt;
    lifeTotal += lt;
  });
  document.getElementById('periodLabel').textContent = `Чистыми · ${period.label.toLowerCase()}`;
  document.getElementById('periodTotal').textContent = fmt(periodTotal) + ' USDT';
  document.getElementById('lifeTotal').textContent = fmt(lifeTotal) + ' USDT';

  // Донат по долям счетов
  renderDonut(perAccountTotal, periodTotal);

  // Линия накопительного роста
  renderGrowth(cutoff, period.label);

  // Win rate
  renderWinRate(cutoff, period.label);

  // Карточки по счетам с барами
  const acctList = document.getElementById('acctList');
  acctList.innerHTML = '';
  ACCOUNTS.forEach(a => {
    const buckets = {};
    Object.entries(DATA[a]).forEach(([date, v]) => {
      if (date < cutoff || date > lastDate) return;
      const k = bucketKey(date, bucketMode);
      buckets[k] = (buckets[k] || 0) + v;
    });
    const keys = Object.keys(buckets).sort();
    const vals = keys.map(k => buckets[k]);
    const maxAbs = Math.max(1, ...vals.map(Math.abs));
    const barsHtml = vals.map(v => {
      const h = Math.max(3, Math.round(Math.abs(v) / maxAbs * 44));
      const color = v >= 0 ? `linear-gradient(180deg, ${ACCT_COLORS[a]}, #e05a48)` : '#5a4f47';
      return `<div class="bar-col"><div class="bar" style="height:${h}px;background:${color}"></div></div>`;
    }).join('');
    const labelsHtml = keys.map(k => {
      const [, m, d] = k.split('-');
      return `<div class="bar-label">${d}.${m}</div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="acct-head"><div class="acct-name">SONIC #${a}</div><div class="acct-total">${perAccountTotal[a] >= 0 ? '+' : ''}${fmt(perAccountTotal[a])}</div></div>
      <div class="bars">${barsHtml}</div>
      <div class="bar-labels">${labelsHtml}</div>
      ${dayListHtml(a)}
    `;
    acctList.appendChild(card);
  });
}

  const svg = document.getElementById('donut');
  const legend = document.getElementById('donutLegend');
  svg.innerHTML = '';
  legend.innerHTML = '';
  const cx = 48, cy = 48, r = 36, sw = 14;
  const sum = ACCOUNTS.reduce((s, a) => s + Math.max(0, perAccountTotal[a]), 0) || 1;
  let angle = -90;
  ACCOUNTS.forEach(a => {
    const val = Math.max(0, perAccountTotal[a]);
    const frac = val / sum;
    const sweep = frac * 360;
    const largeArc = sweep > 180 ? 1 : 0;
    const x1 = cx + r * Math.cos(angle * Math.PI / 180);
    const y1 = cy + r * Math.sin(angle * Math.PI / 180);
    const endAngle = angle + sweep;
    const x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    const y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
    if (frac > 0.001) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', ACCT_COLORS[a]);
      path.setAttribute('stroke-width', sw);
      svg.appendChild(path);
    }
    angle = endAngle;

    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<div class="legend-dot" style="background:${ACCT_COLORS[a]}"></div><div class="legend-name">#${a.slice(-4)}</div><div class="legend-val">${fmt(perAccountTotal[a])}</div>`;
    legend.appendChild(row);
  });
  const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  centerText.setAttribute('x', cx); centerText.setAttribute('y', cy);
  centerText.setAttribute('text-anchor', 'middle'); centerText.setAttribute('dominant-baseline', 'central');
  centerText.setAttribute('fill', '#f3ece0'); centerText.setAttribute('font-size', '11'); centerText.setAttribute('font-weight', '700');
  centerText.textContent = total >= 1000 ? (total/1000).toFixed(1) + 'K' : Math.round(total);
  svg.appendChild(centerText);
}

function renderGrowth(cutoff, periodLabel) {
  document.getElementById('growthTitle').textContent = `Накопительно · ${periodLabel.toLowerCase()}`;

  // общий дневной итог по всем счетам в периоде
  const dailyTotals = {};
  ACCOUNTS.forEach(a => {
    Object.entries(DATA[a]).forEach(([date, v]) => {
      if (date < cutoff || date > lastDate) return;
      dailyTotals[date] = (dailyTotals[date] || 0) + v;
    });
  });
  const dates = Object.keys(dailyTotals).sort();
  let running = 0;
  const points = dates.map(d => { running += dailyTotals[d]; return running; });

  document.getElementById('growthEnd').textContent = (running >= 0 ? '+' : '') + fmt(running) + ' USDT';

  const svg = document.getElementById('growthSvg');
  svg.innerHTML = '';
  if (points.length < 2) {
    svg.setAttribute('viewBox', '0 0 320 100');
    return;
  }
  const W = 320, H = 100, PAD = 6;
  const min = Math.min(0, ...points), max = Math.max(0, ...points);
  const range = (max - min) || 1;
  const x = i => PAD + (i / (points.length - 1)) * (W - PAD * 2);
  const y = v => H - PAD - ((v - min) / range) * (H - PAD * 2);

  const linePath = points.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  const areaPath = `${linePath} L ${x(points.length-1).toFixed(1)} ${H} L ${x(0).toFixed(1)} ${H} Z`;

  const ns = 'http://www.w3.org/2000/svg';
  const defs = document.createElementNS(ns, 'defs');
  defs.innerHTML = `<linearGradient id="growthFill" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c1392b" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#c1392b" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="growthLine" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#935a3c"/>
    <stop offset="100%" stop-color="#e05a48"/>
  </linearGradient>`;
  svg.appendChild(defs);

  const area = document.createElementNS(ns, 'path');
  area.setAttribute('d', areaPath);
  area.setAttribute('fill', 'url(#growthFill)');
  svg.appendChild(area);

  const line = document.createElementNS(ns, 'path');
  line.setAttribute('d', linePath);
  line.setAttribute('fill', 'none');
  line.setAttribute('stroke', 'url(#growthLine)');
  line.setAttribute('stroke-width', '2');
  line.setAttribute('stroke-linecap', 'round');
  line.setAttribute('stroke-linejoin', 'round');
  svg.appendChild(line);

  // точка на конце линии
  const dot = document.createElementNS(ns, 'circle');
  dot.setAttribute('cx', x(points.length-1)); dot.setAttribute('cy', y(points[points.length-1]));
  dot.setAttribute('r', '3.5'); dot.setAttribute('fill', '#d9b673');
  svg.appendChild(dot);

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
}

function renderWinRate(cutoff, periodLabel) {
  const dailyTotals = {};
  ACCOUNTS.forEach(a => {
    Object.entries(DATA[a]).forEach(([date, v]) => {
      if (date < cutoff || date > lastDate) return;
      dailyTotals[date] = (dailyTotals[date] || 0) + v;
    });
  });
  const days = Object.values(dailyTotals);
  const wins = days.filter(v => v > 0).length;
  const rate = days.length ? Math.round((wins / days.length) * 100) : 0;
  document.getElementById('winrateCard').innerHTML =
    `<span>Win rate · ${periodLabel.toLowerCase()}</span><span class="wr-value">${rate}% · ${wins}/${days.length} дней</span>`;
}

function renderMonthly() {
  const MONTH_SHORT = ['', 'янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  const monthTotals = {};
  ACCOUNTS.forEach(a => {
    Object.entries(DATA[a]).forEach(([date, v]) => {
      const ym = date.slice(0, 7);
      monthTotals[ym] = (monthTotals[ym] || 0) + v;
    });
  });
  const months = Object.keys(monthTotals).sort();
  const currentYm = lastDate.slice(0, 7);
  const row = document.getElementById('monthRow');
  row.innerHTML = '';
  months.forEach((ym, i) => {
    const [y, m] = ym.split('-');
    const total = monthTotals[ym];
    const prev = i > 0 ? monthTotals[months[i-1]] : null;
    let deltaHtml = '';
    if (prev !== null && prev !== 0) {
      const pct = Math.round(((total - prev) / Math.abs(prev)) * 100);
      const cls = pct >= 0 ? 'up' : 'down';
      const arrow = pct >= 0 ? '↑' : '↓';
      deltaHtml = `<div class="m-delta ${cls}">${arrow} ${Math.abs(pct)}%</div>`;
    }
    const tile = document.createElement('div');
    tile.className = 'month-tile' + (ym === currentYm ? ' current' : '');
    tile.innerHTML = `<div class="m-name">${MONTH_SHORT[+m]}${ym === currentYm ? ' (на ' + lastDate.slice(8,10) + '.' + m + ')' : ''}</div><div class="m-value">${fmt(total)}</div>${deltaHtml}`;
    row.appendChild(tile);
  });
}

const DOW_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function getMonthWeeks() {
  const [ly, lm] = lastDate.split('-').map(Number);
  const daysInMonth = new Date(Date.UTC(ly, lm, 0)).getUTCDate();
  const weekdays = [];
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(Date.UTC(ly, lm - 1, day));
    const dow = d.getUTCDay();
    if (dow === 0 || dow === 6) continue;
    weekdays.push({ date: `${ly}-${String(lm).padStart(2,'0')}-${String(day).padStart(2,'0')}`, dow });
  }
  const weeks = [];
  let current = [];
  weekdays.forEach(wd => {
    if (wd.dow === 1 && current.length) { weeks.push(current); current = []; }
    current.push(wd);
  });
  if (current.length) weeks.push(current);
  return weeks;
}
const wLabel = w => `${w[0].date.slice(8,10)}.${w[0].date.slice(5,7)}–${w[w.length-1].date.slice(8,10)}.${w[w.length-1].date.slice(5,7)}`;

function dayListHtml(account) {
  const weeks = getMonthWeeks();
  let html = '<div class="day-list">';
  weeks.forEach(week => {
    let weekTotal = 0, weekComplete = true;
    let rows = '';
    week.forEach(wd => {
      const v = DATA[account][wd.date];
      const dateLabel = `${wd.date.slice(8,10)}.${wd.date.slice(5,7)} ${DOW_SHORT[wd.dow]}`;
      if (v === undefined) {
        rows += `<div class="day-row"><span class="d-label">${dateLabel}</span><span class="d-value empty">—</span></div>`;
        weekComplete = false;
      } else {
        weekTotal += v;
        const cls = v < 0 ? 'neg' : '';
        rows += `<div class="day-row"><span class="d-label">${dateLabel}</span><span class="d-value ${cls}">${v >= 0 ? '+' : ''}${fmt(v)}</span></div>`;
      }
    });
    html += rows;
    html += `<div class="week-total-row"><span>Неделя ${wLabel(week)}</span><span class="${weekComplete ? '' : 'pending'}">${weekComplete ? fmt(weekTotal) + ' USDT' : 'ждём данные'}</span></div>`;
  });
  html += '</div>';
  return html;
}

function renderYesterday() {
  let total = 0;
  const rows = ACCOUNTS.map(a => {
    const v = DATA[a][lastDate] || 0;
    total += v;
    return { a, v };
  });
  const dateLabel = lastDate.split('-').reverse().join('.');
  const listHtml = rows.map(r => `
    <div class="yesterday-row">
      <div class="yesterday-dot" style="background:${ACCT_COLORS[r.a]}"></div>
      <div class="yesterday-name">#${r.a.slice(-4)}</div>
      <div class="yesterday-val">${r.v >= 0 ? '+' : ''}${fmt(r.v)}</div>
    </div>`).join('');
  document.getElementById('yesterdayCard').innerHTML = `
    <div class="yesterday-date">${dateLabel}</div>
    <div class="yesterday-total">${total >= 0 ? '+' : ''}${fmt(total)} USDT</div>
    <div class="yesterday-list">${listHtml}</div>
  `;
}

renderYesterday();
renderMonthly();
render();
</script>
