<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Копитрейдинг SONIC</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #161311; --surface: #211c19; --surface-2: #2a2320;
    --red: #c1392b; --red-light: #e05a48; --gold: #d9b673;
    --rust: #935a3c; --taupe: #6b5b4f;
    --text: #f3ece0; --text-2: #a89a87;
    --border: rgba(217,182,115,0.18);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 0%, rgba(193,57,43,0.08), transparent 45%);
    color: var(--text); min-height: 100vh; padding: 20px 16px 40px;
    max-width: 430px; margin: 0 auto;
  }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
  .header-left h1 { font-size: 21px; font-weight: 700; color: var(--gold); }
  .header-left .sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .header-paw { width: 40px; height: 40px; background: linear-gradient(135deg, var(--red), var(--red-light)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; }

  .periods { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 18px; }
  .period-btn { flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); color: var(--text-2); font-size: 12px; padding: 7px 13px; border-radius: 20px; font-family: inherit; }
  .period-btn.active { background: linear-gradient(135deg, var(--red), var(--red-light)); border-color: var(--red); color: var(--text); font-weight: 600; }

  .label { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--gold); margin: 20px 0 10px; opacity: 0.85; }

  .kpi-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .kpi { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 13px; }
  .kpi .k-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi .k-value { font-size: 18px; font-weight: 700; color: var(--gold); margin-top: 4px; font-variant-numeric: tabular-nums; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 9px; }

  .donut-card { display: flex; align-items: center; gap: 16px; }
  .donut-legend { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; color: var(--text-2); }
  .legend-val { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

  .acct-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .acct-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .acct-total { font-size: 17px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 50px; margin: 8px 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 3px; }
  .bar-labels { display: flex; gap: 3px; }
  .bar-label { flex: 1; text-align: center; font-size: 8px; color: var(--text-2); white-space: nowrap; overflow: hidden; }

  .updated { text-align: center; font-size: 10.5px; color: var(--text-2); margin-top: 24px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Копитрейдинг SONIC</h1>
    <div class="sub">4 счёта · чистыми, за вычетом 30%</div>
  </div>
  <div class="header-paw">💹</div>
</div>

<div class="periods" id="periods"></div>

<div class="kpi-row">
  <div class="kpi"><div class="k-label" id="periodLabel">За период</div><div class="k-value" id="periodTotal">—</div></div>
  <div class="kpi"><div class="k-label">Всего с апреля</div><div class="k-value" id="lifeTotal">—</div></div>
</div>

<div class="label">Доли счетов за период</div>
<div class="card donut-card">
  <svg width="96" height="96" viewBox="0 0 96 96" id="donut"></svg>
  <div class="donut-legend" id="donutLegend"></div>
</div>

<div class="label">По счетам</div>
<div id="acctList"></div>

<div class="updated" id="updated"></div>

36, "2026-06-15": 496.72, "2026-06-16": 42.1, "2026-06-17": 272.73, "2026-06-18": 298.99, "2026-06-19": 199.54, "2026-06-22": 268.32, "2026-06-23": 338.02, "2026-06-24": -86.0, "2026-06-25": 510.95, "2026-06-26": 180.07, "2026-06-29": 339.18, "2026-06-30": 204.55, "2026-07-01": 337.38, "2026-07-02": -176.2, "2026-07-03": 268.56, "2026-07-06": 201.54, "2026-07-07": 192.09, "2026-07-08": 484.51, "2026-07-09": 404.05}, "50784486": {"2026-05-04": 32.01, "2026-05-05": 51.12, "2026-05-06": 35.5, "2026-05-07": 59.71, "2026-05-08": 48.55, "2026-05-11": 43.72, "2026-05-12": 71.65, "2026-05-13": 44.13, "2026-05-14": 58.41, "2026-05-15": 121.19, "2026-05-18": 98.98, "2026-05-19": 89.22, "2026-05-20": 46.71, "2026-05-21": 81.18, "2026-05-22": 56.45, "2026-05-25": 203.17, "2026-05-26": 100.18, "2026-05-27": 157.88, "2026-05-28": 146.34, "2026-05-29": 213.36, "2026-06-01": 222.11, "2026-06-02": 119.85, "2026-06-03": 236.36, "2026-06-04": 26.08, "2026-06-05": 113.26, "2026-06-08": 262.42, "2026-06-09": 2.56, "2026-06-10": 48.53, "2026-06-11": 190.09, "2026-06-12": 62.23, "2026-06-15": 296.18, "2026-06-16": 25.11, "2026-06-17": 162.62, "2026-06-18": 178.28, "2026-06-19": 118.99, "2026-06-22": 160.0, "2026-06-23": 201.56, "2026-06-24": -51.28, "2026-06-25": 304.7, "2026-06-26": 107.37, "2026-06-29": 202.24, "2026-06-30": 121.97, "2026-07-01": 201.17, "2026-07-02": -105.06, "2026-07-03": 160.14, "2026-07-06": 120.17, "2026-07-07": 114.54, "2026-07-08": 288.96, "2026-07-09": 240.93}}
;
const ACCOUNTS = Object.keys(DATA);
const ACCT_COLORS = { "50559419": "#c1392b", "50665238": "#d9b673", "50680531": "#935a3c", "50784486": "#6b5b4f" };
const fmt = n => n.toLocaleString('ru-RU', {minimumFractionDigits: 2, maximumFractionDigits: 2});

// последняя дата в данных = точка отсчёта "сегодня"
let lastDate = "2000-01-01";
ACCOUNTS.forEach(a => { const ks = Object.keys(DATA[a]); if (ks.length) { const m = ks[ks.length-1]; if (m > lastDate) lastDate = m; } });
document.getElementById('updated').textContent = `Данные на ${lastDate.split('-').reverse().join('.')}`;

const PERIODS = [
  { key: '7d', label: '7 дней', days: 7 },
  { key: '30d', label: 'Месяц', days: 30 },
  { key: '90d', label: '3 месяца', days: 90 },
  { key: '180d', label: '6 месяцев', days: 180 },
  { key: 'all', label: 'Всё время', days: 99999 },
];
let activePeriod = '30d';

const periodsEl = document.getElementById('periods');
PERIODS.forEach(p => {
  const btn = document.createElement('button');
  btn.className = 'period-btn' + (p.key === activePeriod ? ' active' : '');
  btn.textContent = p.label;
  btn.onclick = () => { activePeriod = p.key; render(); };
  btn.dataset.key = p.key;
  periodsEl.appendChild(btn);
});

function cutoffDate(days) {
  const d = new Date(lastDate + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() - days + 1);
  return d.toISOString().slice(0, 10);
}

function bucketKey(dateStr, mode) {
  if (mode === 'day') return dateStr;
  // неделя: понедельник этой недели
  const d = new Date(dateStr + 'T00:00:00Z');
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() - day + 1);
  return d.toISOString().slice(0, 10);
}

function render() {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.key === activePeriod));
  const period = PERIODS.find(p => p.key === activePeriod);
  const cutoff = period.key === 'all' ? '2000-01-01' : cutoffDate(period.days);
  const useDaily = period.days <= 30;
  const bucketMode = useDaily ? 'day' : 'week';

  // KPI
  let periodTotal = 0, lifeTotal = 0;
  const perAccountTotal = {};
  ACCOUNTS.forEach(a => {
    let pt = 0, lt = 0;
    Object.entries(DATA[a]).forEach(([date, v]) => {
      lt += v;
      if (date >= cutoff && date <= lastDate) pt += v;
    });
    perAccountTotal[a] = pt;
    periodTotal += pt;
    lifeTotal += lt;
  });
  document.getElementById('periodLabel').textContent = `Чистыми · ${period.label.toLowerCase()}`;
  document.getElementById('periodTotal').textContent = fmt(periodTotal) + ' USDT';
  document.getElementById('lifeTotal').textContent = fmt(lifeTotal) + ' USDT';

  // Донат по долям счетов
  renderDonut(perAccountTotal, periodTotal);

  // Карточки по счетам с барами
  const acctList = document.getElementById('acctList');
  acctList.innerHTML = '';
  ACCOUNTS.forEach(a => {
    const buckets = {};
    Object.entries(DATA[a]).forEach(([date, v]) => {
      if (date < cutoff || date > lastDate) return;
      const k = bucketKey(date, bucketMode);
      buckets[k] = (buckets[k] || 0) + v;
    });
    const keys = Object.keys(buckets).sort();
    const vals = keys.map(k => buckets[k]);
    const maxAbs = Math.max(1, ...vals.map(Math.abs));
    const barsHtml = vals.map(v => {
      const h = Math.max(3, Math.round(Math.abs(v) / maxAbs * 44));
      const color = v >= 0 ? `linear-gradient(180deg, ${ACCT_COLORS[a]}, #e05a48)` : '#5a4f47';
      return `<div class="bar-col"><div class="bar" style="height:${h}px;background:${color}"></div></div>`;
    }).join('');
    const labelsHtml = keys.map(k => {
      const [, m, d] = k.split('-');
      return `<div class="bar-label">${d}.${m}</div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="acct-head"><div class="acct-name">SONIC #${a}</div><div class="acct-total">${perAccountTotal[a] >= 0 ? '+' : ''}${fmt(perAccountTotal[a])}</div></div>
      <div class="bars">${barsHtml}</div>
      <div class="bar-labels">${labelsHtml}</div>
    `;
    acctList.appendChild(card);
  });
}

function renderDonut(perAccountTotal, total) {
  const svg = document.getElementById('donut');
  const legend = document.getElementById('donutLegend');
  svg.innerHTML = '';
  legend.innerHTML = '';
  const cx = 48, cy = 48, r = 36, sw = 14;
  const sum = ACCOUNTS.reduce((s, a) => s + Math.max(0, perAccountTotal[a]), 0) || 1;
  let angle = -90;
  ACCOUNTS.forEach(a => {
    const val = Math.max(0, perAccountTotal[a]);
    const frac = val / sum;
    const sweep = frac * 360;
    const largeArc = sweep > 180 ? 1 : 0;
    const x1 = cx + r * Math.cos(angle * Math.PI / 180);
    const y1 = cy + r * Math.sin(angle * Math.PI / 180);
    const endAngle = angle + sweep;
    const x2 = cx + r * Math.cos(endAngle * Math.PI / 180);
    const y2 = cy + r * Math.sin(endAngle * Math.PI / 180);
    if (frac > 0.001) {
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', ACCT_COLORS[a]);
      path.setAttribute('stroke-width', sw);
      svg.appendChild(path);
    }
    angle = endAngle;

    const row = document.createElement('div');
    row.className = 'legend-row';
    row.innerHTML = `<div class="legend-dot" style="background:${ACCT_COLORS[a]}"></div><div class="legend-name">#${a.slice(-4)}</div><div class="legend-val">${fmt(perAccountTotal[a])}</div>`;
    legend.appendChild(row);
  });
  const centerText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  centerText.setAttribute('x', cx); centerText.setAttribute('y', cy);
  centerText.setAttribute('text-anchor', 'middle'); centerText.setAttribute('dominant-baseline', 'central');
  centerText.setAttribute('fill', '#f3ece0'); centerText.setAttribute('font-size', '11'); centerText.setAttribute('font-weight', '700');
  centerText.textContent = total >= 1000 ? (total/1000).toFixed(1) + 'K' : Math.round(total);
  svg.appendChild(centerText);
}

render();
</script>
</body>
</html>
