<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Лапка</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #161311;
    --surface: #211c19;
    --surface-2: #2a2320;
    --red: #c1392b;
    --red-light: #e05a48;
    --gold: #d9b673;
    --text: #f3ece0;
    --text-2: #a89a87;
    --divider: rgba(243,236,224,0.08);
    --border: rgba(217,182,115,0.18);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 20% 0%, rgba(193,57,43,0.08), transparent 45%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px 40px;
    max-width: 430px;
    margin: 0 auto;
  }

  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .header-left h1 { font-size: 26px; font-weight: 700; letter-spacing: 0.5px; color: var(--gold); }
  .header-left .date { font-size: 12.5px; color: var(--text-2); margin-top: 4px; }
  .header-paw { width: 42px; height: 42px; background: linear-gradient(135deg, var(--red), var(--red-light)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 2px 10px rgba(193,57,43,0.35); }

  .label { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--gold); margin: 22px 0 10px; opacity: 0.85; }

  .progress-row { display: flex; gap: 8px; }
  .progress-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; }
  .ring-wrap { position: relative; width: 60px; height: 60px; }
  .ring-center { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .progress-label { font-size: 10.5px; color: var(--text-2); margin-top: 6px; text-align: center; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-bottom: 9px; }

  .project-card { display: flex; align-items: center; gap: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 11px 13px; margin-bottom: 8px; }
  .project-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .project-name { font-size: 14px; font-weight: 600; flex: 1; }
  .project-sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }
  .project-tag { font-size: 10px; color: var(--gold); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; white-space: nowrap; }

  .task-card { display: flex; align-items: center; gap: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 13px; margin-bottom: 8px; }
  .checkbox { width: 21px; height: 21px; border-radius: 7px; border: 1.5px solid var(--gold); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .checkbox.checked { background: linear-gradient(135deg, var(--red), var(--red-light)); border-color: var(--red); }
  .check-icon { width: 10px; height: 6px; border-left: 2px solid var(--text); border-bottom: 2px solid var(--text); transform: rotate(-45deg) translateY(-1px); opacity: 0; }
  .checkbox.checked .check-icon { opacity: 1; }
  .task-text { font-size: 13.5px; flex: 1; }
  .task-text.done { color: var(--text-2); text-decoration: line-through; }
  .task-meta { font-size: 10.5px; color: var(--text-2); margin-top: 2px; }

  .reminder-card { display: flex; align-items: center; gap: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 11px 13px; margin-bottom: 8px; }
  .reminder-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .reminder-dot.today { background: var(--red-light); box-shadow: 0 0 0 3px rgba(224,90,72,0.2); }
  .reminder-dot.overdue { background: var(--red); }
  .reminder-what { font-size: 13.5px; font-weight: 500; }
  .reminder-when { font-size: 11px; color: var(--text-2); margin-top: 1px; }

  .acct-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .acct-name { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .acct-total { font-size: 16px; font-weight: 700; color: var(--gold); font-variant-numeric: tabular-nums; }
  .bars { display: flex; align-items: flex-end; gap: 5px; height: 46px; margin: 6px 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 3px; }
  .bar-labels { display: flex; gap: 5px; }
  .bar-label { flex: 1; text-align: center; font-size: 8.5px; color: var(--text-2); }
  .acct-lifetime { font-size: 10.5px; color: var(--text-2); margin-top: 5px; }
  .kpi-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .kpi { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 11px 12px; }
  .kpi .k-label { font-size: 10px; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi .k-value { font-size: 17px; font-weight: 700; color: var(--gold); margin-top: 3px; font-variant-numeric: tabular-nums; }

  .timeline-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; font-size: 13px; }
  .tl-mark { width: 15px; height: 15px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .tl-mark.done { background: var(--red); color: var(--text); }
  .tl-mark.today { background: var(--gold); color: var(--bg); }
  .tl-mark.upcoming { border: 1.5px solid var(--border); }
  .tl-date { color: var(--text-2); font-size: 10.5px; }

  .empty { color: var(--text-2); font-size: 13px; padding: 10px 2px; }
  .reset-btn { width: 100%; margin-top: 6px; background: none; border: 1px solid var(--border); color: var(--text-2); padding: 10px; border-radius: 12px; font-size: 12px; margin-top: 4px; font-family: inherit; letter-spacing: 0.5px; }
  .reset-btn:active { border-color: var(--red-light); color: var(--red-light); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Лапка</h1>
    <div class="date" id="dateStr"></div>
  </div>
  <div class="header-paw">🐾</div>
</div>

<div class="label">Прогресс сегодня</div>
<div class="progress-row">
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="25" fill="none" stroke="var(--surface-2)" stroke-width="5.5"/>
        <circle cx="30" cy="30" r="25" fill="none" stroke="url(#g1)" stroke-width="5.5" stroke-dasharray="157" stroke-dashoffset="157" id="ring-daily" stroke-linecap="round" transform="rotate(-90 30 30)"/>
        <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c1392b"/><stop offset="100%" stop-color="#e05a48"/></linearGradient></defs>
      </svg>
      <div class="ring-center" id="ring-daily-text">0/3</div>
    </div>
    <div class="progress-label">Задачи дня</div>
  </div>
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="25" fill="none" stroke="var(--surface-2)" stroke-width="5.5"/>
        <circle cx="30" cy="30" r="25" fill="none" stroke="url(#g2)" stroke-width="5.5" stroke-dasharray="157" stroke-dashoffset="0" id="ring-proj" stroke-linecap="round" transform="rotate(-90 30 30)"/>
        <defs><linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#d9b673"/><stop offset="100%" stop-color="#c1392b"/></linearGradient></defs>
      </svg>
      <div class="ring-center" id="ring-proj-text">5</div>
    </div>
    <div class="progress-label">Проектов</div>
  </div>
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="25" fill="none" stroke="var(--surface-2)" stroke-width="5.5"/>
        <circle cx="30" cy="30" r="25" fill="none" stroke="url(#g3)" stroke-width="5.5" stroke-dasharray="157" stroke-dashoffset="157" id="ring-remind" stroke-linecap="round" transform="rotate(-90 30 30)"/>
        <defs><linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e05a48"/><stop offset="100%" stop-color="#d9b673"/></linearGradient></defs>
      </svg>
      <div class="ring-center" id="ring-remind-text">0</div>
    </div>
    <div class="progress-label">Напомин.</div>
  </div>
</div>

<div class="label">Напоминания</div>
<div id="reminders"><div class="empty">Загрузка...</div></div>

<div class="label">Проекты в работе</div>
<div id="projects"></div>

<div class="label">Курс ЛАБС</div>
<div class="card"><div id="timeline"></div></div>

<div class="label">Ежедневные задачи</div>
<div id="daily"></div>
<button class="reset-btn" onclick="resetDaily()">↺ Сбросить галочки</button>

<script>
const now = new Date();
const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
document.getElementById('dateStr').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

// Проекты
const projects = [
  { name: "Лучи", sub: "закупки и ремонт", icon: "🏗️", color: "rgba(193,57,43,0.18)" },
  { name: "Тагильская", sub: "второй объект", icon: "🏢", color: "rgba(217,182,115,0.18)" },
  { name: "Копитрейдинг", sub: "4 счёта SONIC", icon: "💹", color: "rgba(193,57,43,0.18)" },
  { name: "Обучение ЛАБС", sub: "поток 5, неделя 4 из 5", icon: "📚", color: "rgba(217,182,115,0.18)" },
  { name: "Разработка Лапки", sub: "архитектура и дашборд", icon: "🐾", color: "rgba(193,57,43,0.18)" }
];
const pEl = document.getElementById('projects');
projects.forEach(p => {
  pEl.innerHTML += `<div class="project-card">
    <div class="project-icon" style="background:${p.color}">${p.icon}</div>
    <div style="flex:1"><div class="project-name">${p.name}</div><div class="project-sub">${p.sub}</div></div>
    <div class="project-tag">В работе</div>
  </div>`;
});
document.getElementById('ring-proj-text').textContent = projects.length;

// Ежедневные задачи
const dailyTasks = [
  "Ввод данных по сделкам копитрейда",
  "Расходы и дорожная карта по проектам",
  "Обучение и вайбкодинг"
];
const STORAGE_KEY = 'lapka_daily_' + now.toDateString();
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

function renderDaily() {
  const el = document.getElementById('daily');
  el.innerHTML = '';
  let done = 0;
  dailyTasks.forEach((t, i) => {
    const isDone = checked.includes(i);
    if (isDone) done++;
    el.innerHTML += `<div class="task-card" onclick="toggleTask(${i})">
      <div class="checkbox ${isDone ? 'checked' : ''}"><div class="check-icon"></div></div>
      <div class="task-text ${isDone ? 'done' : ''}">${t}</div>
    </div>`;
  });
  const circ = 157, pct = done / dailyTasks.length;
  document.getElementById('ring-daily').style.strokeDashoffset = circ - circ * pct;
  document.getElementById('ring-daily-text').textContent = `${done}/${dailyTasks.length}`;
}
function toggleTask(i) {
  checked.includes(i) ? checked = checked.filter(x => x !== i) : checked.push(i);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  renderDaily();
}
function resetDaily() { checked = []; localStorage.setItem(STORAGE_KEY, JSON.stringify(checked)); renderDaily(); }
renderDaily();

// Напоминания
async function loadReminders() {
  const el = document.getElementById('reminders');
  try {
    const res = await fetch('/lapka-dashboard/reminders.json');
    const data = await res.json();
    if (!data.length) {
      el.innerHTML = '<div class="empty">Нет активных напоминаний 🎉</div>';
      document.getElementById('ring-remind-text').textContent = '0';
      return;
    }
    el.innerHTML = '';
    document.getElementById('ring-remind-text').textContent = data.length;
    const nowMs = Date.now();
    data.sort((a, b) => new Date(a.when) - new Date(b.when));
    data.forEach(r => {
      const due = new Date(r.when + ':00Z');
      const dueMsk = new Date(due.getTime() + 3 * 3600000);
      const diff = due - nowMs;
      let cls = diff < 0 ? 'overdue' : diff < 86400000 ? 'today' : '';
      const timeStr = dueMsk.toLocaleString('ru', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      el.innerHTML += `<div class="reminder-card">
        <div class="reminder-dot ${cls}"></div>
        <div><div class="reminder-what">${r.what}</div><div class="reminder-when">${timeStr}</div></div>
      </div>`;
    });
  } catch(e) {
    el.innerHTML = '<div class="empty">Нет активных напоминаний 🎉</div>';
    document.getElementById('ring-remind-text').textContent = '0';
  }
}
loadReminders();

// ЛАБС
const events = [
  {date: "19.06 – 08.07", text: "Эфиры недель 1–4 (9 из 9)", status: "done"},
  {date: "10.07", text: "Разбор трудностей недели с Мари", status: "done"},
  {date: "12.07", text: "Конкурс 3 недели", status: "upcoming"},
  {date: "13.07", text: "Мастер-класс: лендинг", status: "upcoming"},
  {date: "15.07", text: "Мастер-класс: воронка продаж", status: "upcoming"},
  {date: "17.07", text: "Разбор трудностей недели с Олей", status: "upcoming"},
  {date: "19.07", text: "Конкурс 4 недели", status: "upcoming"},
  {date: "26.07", text: "Защиты — финал потока", status: "upcoming"},
];
const timeline = document.getElementById('timeline');
events.forEach(e => {
  const mark = e.status === 'done' ? '✓' : '';
  timeline.innerHTML += `<div class="timeline-item">
    <div class="tl-mark ${e.status}">${mark}</div>
    <div><div>${e.text}</div><div class="tl-date">${e.date}</div></div>
  </div>`;
});
</script>
</body>
</html>
