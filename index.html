<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Лапка</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: #13131f;
    color: #fff;
    min-height: 100vh;
    padding: 20px 16px 32px;
    max-width: 430px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }
  .header-left h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #ff6fd8, #a855f7, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-left .date {
    font-size: 13px;
    color: #5a5a7a;
    margin-top: 4px;
    font-weight: 500;
  }
  .header-paw {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #ff6fd8, #a855f7);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  /* SECTION LABEL */
  .label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #5a5a7a;
    margin-bottom: 12px;
    margin-top: 24px;
  }

  /* PROGRESS RING BLOCK */
  .progress-row {
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }
  .progress-card {
    flex: 1;
    background: #1c1c2e;
    border-radius: 18px;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .ring-wrap { position: relative; width: 64px; height: 64px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700;
  }
  .progress-label { font-size: 11px; color: #5a5a7a; font-weight: 600; text-align: center; }

  /* НАПОМИНАНИЯ */
  .reminder-card {
    background: #1c1c2e;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .reminder-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, #a855f7, #6366f1);
  }
  .reminder-dot.overdue { background: linear-gradient(135deg, #ff4d4d, #ff6b6b); }
  .reminder-dot.today { background: linear-gradient(135deg, #ff9f43, #ffcf43); }
  .reminder-info { flex: 1; }
  .reminder-what { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .reminder-when { font-size: 12px; color: #5a5a7a; }
  .empty { color: #3a3a5a; font-size: 13px; padding: 6px 0; }

  /* ПРОЕКТЫ */
  .project-card {
    background: #1c1c2e;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .project-icon {
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .project-name { font-size: 14px; font-weight: 600; }
  .project-tag {
    margin-left: auto;
    font-size: 10px;
    font-weight: 700;
    color: #a855f7;
    background: rgba(168,85,247,0.12);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ЗАДАЧИ */
  .task-card {
    background: #1c1c2e;
    border-radius: 16px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
  }
  .task-card:active { transform: scale(0.98); }
  .checkbox {
    width: 24px; height: 24px;
    border-radius: 8px;
    border: 2px solid #2e2e45;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .checkbox.checked {
    background: linear-gradient(135deg, #ff6fd8, #a855f7);
    border-color: transparent;
  }
  .check-icon { display: none; }
  .checkbox.checked .check-icon {
    display: block;
    width: 12px; height: 9px;
    border-left: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(-45deg) translateY(-1px);
  }
  .task-text { font-size: 14px; font-weight: 600; flex: 1; transition: color 0.2s; }
  .task-text.done { color: #3a3a5a; text-decoration: line-through; }

  .reset-btn {
    width: 100%;
    background: transparent;
    border: 1.5px solid #2e2e45;
    color: #5a5a7a;
    font-size: 12px;
    font-weight: 600;
    padding: 12px;
    border-radius: 14px;
    cursor: pointer;
    margin-top: 4px;
    font-family: inherit;
    letter-spacing: 0.5px;
    transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:active { border-color: #a855f7; color: #a855f7; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Лапка</h1>
    <div class="date" id="dateStr"></div>
  </div>
  <div class="header-paw">🐾</div>
</div>

<!-- КОЛЬЦА ПРОГРЕССА -->
<div class="label">Прогресс сегодня</div>
<div class="progress-row">
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2e2e45" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none"
          stroke="url(#g1)" stroke-width="6"
          stroke-dasharray="163" stroke-dashoffset="163" id="ring-daily"
          stroke-linecap="round"/>
        <defs>
          <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff6fd8"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-center" id="ring-daily-text">0/3</div>
    </div>
    <div class="progress-label">Задачи дня</div>
  </div>
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2e2e45" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none"
          stroke="url(#g2)" stroke-width="6"
          stroke-dasharray="163" stroke-dashoffset="49" id="ring-proj"
          stroke-linecap="round"/>
        <defs>
          <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff9f43"/>
            <stop offset="100%" stop-color="#ff6fd8"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-center">5</div>
    </div>
    <div class="progress-label">Проектов</div>
  </div>
  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2e2e45" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none"
          stroke="url(#g3)" stroke-width="6"
          stroke-dasharray="163" stroke-dashoffset="163" id="ring-remind"
          stroke-linecap="round"/>
        <defs>
          <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1"/>
            <stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="ring-center" id="ring-remind-text">0</div>
    </div>
    <div class="progress-label">Напомин.</div>
  </div>
</div>

<!-- НАПОМИНАНИЯ -->
<div class="label">Напоминания</div>
<div id="reminders"><div class="empty">Загрузка...</div></div>

<!-- ПРОЕКТЫ -->
<div class="label">Проекты в работе</div>
<div id="projects"></div>

<!-- ЗАДАЧИ -->
<div class="label">Ежедневные задачи</div>
<div id="daily"></div>
<button class="reset-btn" onclick="resetDaily()">↺ Сбросить галочки</button>

<script>
// Дата
const now = new Date();
const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
document.getElementById('dateStr').textContent =
  `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;

// Проекты
const projects = [
  { name: "Лучи", icon: "🏗️", color: "rgba(255,111,216,0.15)" },
  { name: "Тагильская", icon: "🏢", color: "rgba(168,85,247,0.15)" },
  { name: "Анализ ошибок по проектам", icon: "🔍", color: "rgba(99,102,241,0.15)" },
  { name: "Обучение ЛАБС", icon: "📚", color: "rgba(255,159,67,0.15)" },
  { name: "Разработка Лапки", icon: "🐾", color: "rgba(255,111,216,0.15)" }
];
const pEl = document.getElementById('projects');
projects.forEach(p => {
  pEl.innerHTML += `
    <div class="project-card">
      <div class="project-icon" style="background:${p.color}">${p.icon}</div>
      <div class="project-name">${p.name}</div>
      <div class="project-tag">В работе</div>
    </div>`;
});

// Ежедневные задачи
const dailyTasks = [
  "Ввод данных по сделкам копитрейда",
  "Расходы и дорожная карта по проектам",
  "Обучение и вайбкодинг"
];
const STORAGE_KEY = 'lapka_daily_' + now.toDateString();
let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

function renderDaily() {
  const el = document.getElementById('daily');
  el.innerHTML = '';
  let done = 0;
  dailyTasks.forEach((t, i) => {
    const isDone = checked.includes(i);
    if (isDone) done++;
    el.innerHTML += `
      <div class="task-card" onclick="toggleTask(${i})">
        <div class="checkbox ${isDone ? 'checked' : ''}"><div class="check-icon"></div></div>
        <div class="task-text ${isDone ? 'done' : ''}">${t}</div>
      </div>`;
  });
  // Обновить кольцо
  const total = dailyTasks.length;
  const pct = done / total;
  const circ = 163;
  document.getElementById('ring-daily').style.strokeDashoffset = circ - circ * pct;
  document.getElementById('ring-daily-text').textContent = `${done}/${total}`;
}

function toggleTask(i) {
  checked.includes(i) ? checked = checked.filter(x => x !== i) : checked.push(i);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  renderDaily();
}
function resetDaily() {
  checked = [];
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  renderDaily();
}
renderDaily();

// Напоминания
async function loadReminders() {
  const el = document.getElementById('reminders');
  try {
    const res = await fetch('/reminders.json');
    const data = await res.json();
    if (!data.length) {
      el.innerHTML = '<div class="empty">Нет активных напоминаний 🎉</div>';
      document.getElementById('ring-remind-text').textContent = '0';
      return;
    }
    el.innerHTML = '';
    document.getElementById('ring-remind-text').textContent = data.length;
    const nowMs = Date.now();
    data.sort((a, b) => new Date(a.when) - new Date(b.when));
    data.forEach(r => {
      const due = new Date(r.when + ':00Z');
      const dueMsk = new Date(due.getTime() + 3 * 3600000);
      const diff = due - nowMs;
      let cls = diff < 0 ? 'overdue' : diff < 86400000 ? 'today' : '';
      const timeStr = dueMsk.toLocaleString('ru', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      el.innerHTML += `
        <div class="reminder-card">
          <div class="reminder-dot ${cls}"></div>
          <div class="reminder-info">
            <div class="reminder-what">${r.what}</div>
            <div class="reminder-when">${timeStr}</div>
          </div>
        </div>`;
    });
  } catch(e) {
    el.innerHTML = '<div class="empty">Нет активных напоминаний 🎉</div>';
    document.getElementById('ring-remind-text').textContent = '0';
  }
}
loadReminders();
</script>
</body>
</html>
